<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; padding: 2rem; max-width: 600px; width: 100%; }
  h1 { font-size: 2.5rem; letter-spacing: 6px; color: #e94560; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.8rem; color: #888; letter-spacing: 3px; margin-bottom: 2rem; }
  .gallows-area { margin: 1.5rem auto; }
  svg text { font-family: monospace; }

  .word-display { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0; }
  .letter-box { width: 36px; height: 48px; border-bottom: 3px solid #e94560; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #fff; text-transform: uppercase; }

  .status-bar { font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; }
  .status-bar span { color: #e94560; font-weight: bold; }
  .wrong-letters { min-height: 24px; font-size: 0.9rem; color: #e94560; letter-spacing: 3px; margin-bottom: 0.5rem; }
  .hint { font-size: 0.75rem; color: #666; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1rem; }
  .message { font-size: 1.2rem; font-weight: bold; min-height: 30px; margin-bottom: 1rem; color: #f5c518; }

  .keyboard { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.5rem; }
  .key { width: 38px; height: 38px; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #eee; font-family: monospace; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.12s; text-transform: uppercase; }
  .key:hover:not(:disabled) { background: #0f3460; border-color: #e94560; }
  .key:disabled { cursor: not-allowed; }
  .key.correct { background: #1a472a; border-color: #2ecc71; color: #2ecc71; opacity: 0.7; }
  .key.wrong { background: #3d0000; border-color: #e94560; color: #e94560; opacity: 0.5; }

  .new-btn { padding: 10px 32px; background: #e94560; border: none; border-radius: 6px; color: #fff; font-family: monospace; font-size: 14px; letter-spacing: 2px; cursor: pointer; transition: background 0.15s; }
  .new-btn:hover { background: #c73652; }
</style>
</head>
<body>
<div class="container">
  <h1>HANGMAN</h1>
  <div class="subtitle">guess the word &bull; 6 wrong guesses allowed</div>

  <div class="gallows-area">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <!-- Structure -->
      <line x1="20" y1="170" x2="160" y2="170" stroke="#555" stroke-width="3" stroke-linecap="round"/>
      <line x1="55" y1="170" x2="55" y2="10" stroke="#555" stroke-width="3" stroke-linecap="round"/>
      <line x1="55" y1="10" x2="115" y2="10" stroke="#555" stroke-width="3" stroke-linecap="round"/>
      <line x1="115" y1="10" x2="115" y2="35" stroke="#555" stroke-width="3" stroke-linecap="round"/>
      <!-- Body parts -->
      <circle id="p-head" cx="115" cy="50" r="15" stroke="#e94560" stroke-width="2.5" fill="none" style="display:none"/>
      <line id="p-body" x1="115" y1="65" x2="115" y2="115" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-larm" x1="115" y1="78" x2="90" y2="100" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-rarm" x1="115" y1="78" x2="140" y2="100" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-lleg" x1="115" y1="115" x2="90" y2="148" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
      <line id="p-rleg" x1="115" y1="115" x2="140" y2="148" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" style="display:none"/>
    </svg>
  </div>

  <div class="word-display" id="word-display"></div>
  <div class="wrong-letters" id="wrong-letters"></div>
  <div class="status-bar">Wrong: <span id="wrong-count">0</span> / 6</div>
  <div class="hint" id="hint"></div>
  <div class="message" id="message"></div>
  <div class="keyboard" id="keyboard"></div>
  <button class="new-btn" onclick="newGame()">NEW GAME ↻</button>
</div>

<script>
const WORDS = [
  { word: "python", hint: "a popular programming language" },
  { word: "keyboard", hint: "you type on this device" },
  { word: "elephant", hint: "the largest land animal" },
  { word: "galaxy", hint: "a vast system of stars" },
  { word: "jungle", hint: "a dense tropical forest" }
];

const PARTS = ["p-head","p-body","p-larm","p-rarm","p-lleg","p-rleg"];

let word = "", guessed = new Set(), wrongCount = 0, gameOver = false;

function newGame() {
  const pick = WORDS[Math.floor(Math.random() * WORDS.length)];
  word = pick.word;
  guessed = new Set();
  wrongCount = 0;
  gameOver = false;
  PARTS.forEach(id => document.getElementById(id).style.display = "none");
  document.getElementById("message").textContent = "";
  document.getElementById("hint").textContent = "hint: " + pick.hint;
  document.getElementById("wrong-count").textContent = "0";
  document.getElementById("wrong-letters").textContent = "";
  renderWord();
  renderKeyboard();
}

function renderWord() {
  document.getElementById("word-display").innerHTML =
    word.split("").map(l =>
      `<div class="letter-box">${guessed.has(l) ? l : ""}</div>`
    ).join("");
}

function renderKeyboard() {
  document.getElementById("keyboard").innerHTML =
    "abcdefghijklmnopqrstuvwxyz".split("").map(l => {
      const used = guessed.has(l);
      const cls = used ? (word.includes(l) ? "correct" : "wrong") : "";
      return `<button class="key ${cls}" onclick="guess('${l}')" ${(used||gameOver)?"disabled":""}>${l}</button>`;
    }).join("");
}

function guess(letter) {
  if (guessed.has(letter) || gameOver) return;
  guessed.add(letter);
  if (!word.includes(letter)) {
    wrongCount++;
    document.getElementById("wrong-count").textContent = wrongCount;
    document.getElementById(PARTS[wrongCount - 1]).style.display = "block";
    const wrongs = [...guessed].filter(l => !word.includes(l));
    document.getElementById("wrong-letters").textContent = wrongs.join("  ").toUpperCase();
    if (wrongCount >= 6) {
      gameOver = true;
      document.getElementById("message").textContent = `☠ Game over! The word was "${word.toUpperCase()}"`;
      document.getElementById("message").style.color = "#e94560";
    }
  } else {
    const won = word.split("").every(l => guessed.has(l));
    if (won) {
      gameOver = true;
      document.getElementById("message").textContent = "✓ You got it! Well done!";
      document.getElementById("message").style.color = "#2ecc71";
    }
  }
  renderWord();
  renderKeyboard();
}

document.addEventListener("keydown", e => {
  const l = e.key.toLowerCase();
  if (/^[a-z]$/.test(l) && !guessed.has(l) && !gameOver) guess(l);
});

newGame();
</script>
</body>
</html>
